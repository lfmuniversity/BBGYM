<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BBGYM</title>
  <meta name="theme-color" content="#eef0f4" />
  <style>
    :root {
      --bg: #eef0f4;
      --bg2: #fafafa;
      --card: rgba(255,255,255,0.78);
      --card-strong: rgba(255,255,255,0.94);
      --text: #111113;
      --muted: #787b86;
      --soft: #a5a8b2;
      --line: rgba(20,22,28,0.08);
      --accent: #111113;
      --accent2: #3c3f48;
      --danger: #b42318;
      --shadow: 0 18px 45px rgba(21, 25, 35, 0.10);
      --shadow-soft: 0 8px 24px rgba(21, 25, 35, 0.07);
      --radius-xl: 30px;
      --radius: 22px;
      --radius-sm: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0e11;
        --bg2: #17181d;
        --card: rgba(29,30,36,0.72);
        --card-strong: rgba(35,36,43,0.94);
        --text: #f6f6f7;
        --muted: #a0a3ad;
        --soft: #737783;
        --line: rgba(255,255,255,0.09);
        --accent: #f6f6f7;
        --accent2: #d7d8dc;
        --shadow: 0 20px 50px rgba(0,0,0,0.38);
        --shadow-soft: 0 8px 24px rgba(0,0,0,0.24);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 0%, rgba(255,255,255,0.95), transparent 28%),
        radial-gradient(circle at 90% 6%, rgba(200,205,218,0.55), transparent 32%),
        linear-gradient(180deg, var(--bg2), var(--bg) 38%);
      padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 22px);
    }

    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(circle at 12% 0%, rgba(80,84,100,0.38), transparent 28%),
          radial-gradient(circle at 92% 8%, rgba(70,75,95,0.24), transparent 34%),
          linear-gradient(180deg, #17181d, var(--bg) 38%);
      }
    }

    .app {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      padding: 22px 2px 14px;
      position: relative;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: var(--bg);
      font-weight: 950;
      letter-spacing: -0.08em;
      box-shadow: var(--shadow-soft);
    }

    .today-pill {
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      border-radius: 999px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      font-size: clamp(42px, 11vw, 72px);
      letter-spacing: -0.075em;
      line-height: .86;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      margin-top: 14px;
      line-height: 1.35;
      max-width: 540px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 18px 0 16px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 17px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(22px);
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .stat .value {
      font-size: 27px;
      font-weight: 950;
      margin-top: 5px;
      letter-spacing: -0.055em;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 3px 10px;
    }

    .section-title strong {
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 11px;
      padding-bottom: 10px;
    }

    .exercise {
      background: var(--card-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 15px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
      overflow: hidden;
      position: relative;
    }

    .exercise::before {
      content: "";
      position: absolute;
      left: 0;
      top: 18px;
      width: 4px;
      height: 38px;
      border-radius: 999px;
      background: var(--accent);
      opacity: .9;
    }

    .exercise-title {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 13px;
      padding-left: 4px;
    }

    .num {
      width: 30px;
      height: 30px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: rgba(127,127,127,0.11);
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .exercise-title h2 {
      font-size: 17px;
      margin: 0;
      letter-spacing: -0.035em;
      line-height: 1.1;
    }

    .last {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
      background: rgba(127,127,127,0.10);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 9px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr;
      gap: 8px;
    }

    .field {
      background: rgba(127,127,127,0.075);
      border: 1px solid var(--line);
      border-radius: 19px;
      padding: 8px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 5px;
      text-align: center;
    }

    input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 14px;
      padding: 7px 4px 8px;
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.045em;
      outline: none;
      text-align: center;
      appearance: textfield;
    }

    input::placeholder {
      color: var(--soft);
      opacity: .75;
    }

    input:focus {
      background: rgba(127,127,127,0.11);
    }

    .actions {
      position: sticky;
      bottom: 0;
      z-index: 10;
      padding: 15px 0 3px;
      background: linear-gradient(to top, var(--bg) 76%, transparent);
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 22px;
      font-size: 17px;
      font-weight: 950;
      letter-spacing: -0.02em;
      padding: 17px 18px;
      cursor: pointer;
      color: var(--bg);
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      box-shadow: var(--shadow);
    }

    .secondary {
      color: var(--text);
      background: var(--card-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      min-width: 58px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 94px);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      background: var(--text);
      color: var(--bg);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      transition: .25s ease;
      pointer-events: none;
      z-index: 30;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    details {
      margin: 18px 0 0;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 16px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
    }

    summary {
      cursor: pointer;
      font-weight: 950;
      letter-spacing: -0.03em;
      font-size: 17px;
    }

    .history-item {
      border-top: 1px solid var(--line);
      padding-top: 13px;
      margin-top: 13px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.48;
    }

    .history-date {
      color: var(--text);
      font-weight: 950;
      margin-bottom: 7px;
    }

    .danger {
      margin-top: 12px;
      width: 100%;
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(180,35,24,.28);
      box-shadow: none;
    }

    @media (max-width: 460px) {
      body { padding-left: 12px; padding-right: 12px; }
      .topbar { gap: 10px; }
      .stat { padding: 14px; border-radius: 21px; }
      .stat .value { font-size: 24px; }
      .exercise { padding: 13px; border-radius: 26px; }
      .exercise-title { grid-template-columns: auto 1fr; }
      .last {
        grid-column: 1 / -1;
        justify-self: start;
        margin-left: 40px;
      }
      .fields { gap: 7px; }
      .field { padding: 7px 5px; border-radius: 17px; }
      input { font-size: 22px; }
      h1 { font-size: 48px; }
      .subtitle { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand-row">
        <div class="logo">BB</div>
        <div class="today-pill" id="todayPill">Oggi</div>
      </div>

      <h1>BBGYM</h1>
      <div class="subtitle">La tua scheda total body sempre pronta. Aggiorna i carichi, salva e riparti dalla prossima sessione.</div>
    </header>

    <div class="topbar">
      <div class="stat">
        <div class="label">Esercizi</div>
        <div class="value" id="exerciseCount">0</div>
      </div>
      <div class="stat">
        <div class="label">Ultimo save</div>
        <div class="value" id="lastSave">—</div>
      </div>
    </div>

    <div class="section-title">
      <strong>Total body</strong>
      <span>kg · reps · serie</span>
    </div>

    <main class="list" id="exerciseList"></main>

    <details>
      <summary>Storico sessioni</summary>
      <div id="history"></div>
      <button class="danger" onclick="clearHistory()">Cancella storico</button>
    </details>

    <div class="actions">
      <button onclick="saveWorkout()">Salva allenamento</button>
      <button class="secondary" onclick="resetCurrent()">↺</button>
    </div>
  </div>

  <div class="toast" id="toast">Salvato</div>

  <script>
    const exercises = [
      "Leg Extension",
      "Leg Curl",
      "Pectoral Machine",
      "Pectoral Machine Obliqua",
      "Manubri su Panca Obliqua",
      "Pectoral ai Cavi Alti",
      "Triceps su Barra a V",
      "Triceps su Seduta",
      "Biceps ai Manubri Seduto",
      "Biceps ai Cavi",
      "Lat Machine",
      "Lat Machine Split",
      "Pulley",
      "Pulley su Macchina",
      "Shoulder Press",
      "Alzate Laterali ai Cavi",
      "Alzate Laterali ai Manubri"
    ];

    const STORAGE_CURRENT = "bbgymCurrent_v1";
    const STORAGE_HISTORY = "bbgymHistory_v1";

    const $ = (id) => document.getElementById(id);

    function todayLabel(date = new Date()) {
      return date.toLocaleDateString("it-IT", { day: "2-digit", month: "short" });
    }

    function fullDateLabel(date = new Date()) {
      return date.toLocaleString("it-IT", {
        day: "2-digit", month: "2-digit", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function loadCurrent() {
      return JSON.parse(localStorage.getItem(STORAGE_CURRENT) || "{}");
    }

    function loadHistory() {
      return JSON.parse(localStorage.getItem(STORAGE_HISTORY) || "[]");
    }

    function saveCurrent(data) {
      localStorage.setItem(STORAGE_CURRENT, JSON.stringify(data));
    }

    function render() {
      const current = loadCurrent();
      $("exerciseCount").textContent = exercises.length;
      $("todayPill").textContent = new Date().toLocaleDateString("it-IT", {
        weekday: "short", day: "2-digit", month: "short"
      });

      const lastSave = current.__lastSave ? todayLabel(new Date(current.__lastSave)) : "—";
      $("lastSave").textContent = lastSave;

      $("exerciseList").innerHTML = exercises.map((name, index) => {
        const item = current[name] || {};
        const lastText = item.kg || item.reps || item.sets
          ? `${item.kg || "—"} kg · ${item.reps || "—"} reps · ${item.sets || "—"} serie`
          : "mai salvato";

        return `
          <section class="exercise">
            <div class="exercise-title">
              <div class="num">${index + 1}</div>
              <h2>${name}</h2>
              <div class="last">${lastText}</div>
            </div>
            <div class="fields">
              <div class="field">
                <label>KG</label>
                <input inputmode="decimal" data-name="${name}" data-field="kg" value="${item.kg || ""}" placeholder="0">
              </div>
              <div class="field">
                <label>Reps</label>
                <input inputmode="numeric" data-name="${name}" data-field="reps" value="${item.reps || ""}" placeholder="0">
              </div>
              <div class="field">
                <label>Serie</label>
                <input inputmode="numeric" data-name="${name}" data-field="sets" value="${item.sets || ""}" placeholder="0">
              </div>
            </div>
          </section>
        `;
      }).join("");

      renderHistory();
    }

    function collectForm() {
      const current = loadCurrent();
      document.querySelectorAll("input").forEach(input => {
        const name = input.dataset.name;
        const field = input.dataset.field;
        if (!current[name]) current[name] = {};
        current[name][field] = input.value.trim();
      });
      current.__lastSave = new Date().toISOString();
      return current;
    }

    function saveWorkout() {
      const current = collectForm();
      saveCurrent(current);

      const history = loadHistory();
      const snapshot = {
        date: new Date().toISOString(),
        data: exercises.reduce((acc, name) => {
          acc[name] = current[name] || {};
          return acc;
        }, {})
      };

      history.unshift(snapshot);
      localStorage.setItem(STORAGE_HISTORY, JSON.stringify(history.slice(0, 50)));

      showToast("Allenamento salvato");
      render();
    }

    function resetCurrent() {
      if (!confirm("Vuoi svuotare i campi attuali? Lo storico resta salvato.")) return;
      localStorage.removeItem(STORAGE_CURRENT);
      showToast("Campi svuotati");
      render();
    }

    function clearHistory() {
      if (!confirm("Vuoi cancellare tutto lo storico? I carichi attuali restano.")) return;
      localStorage.removeItem(STORAGE_HISTORY);
      showToast("Storico cancellato");
      renderHistory();
    }

    function renderHistory() {
      const history = loadHistory();
      if (!history.length) {
        $("history").innerHTML = `<div class="history-item">Nessuna sessione salvata.</div>`;
        return;
      }

      $("history").innerHTML = history.slice(0, 10).map(session => {
        const rows = exercises.map(name => {
          const item = session.data[name] || {};
          if (!item.kg && !item.reps && !item.sets) return "";
          return `${name}: ${item.kg || "—"} kg · ${item.reps || "—"} reps · ${item.sets || "—"} serie`;
        }).filter(Boolean).join("<br>");

        return `
          <div class="history-item">
            <div class="history-date">${fullDateLabel(new Date(session.date))}</div>
            ${rows || "Sessione vuota"}
          </div>
        `;
      }).join("");
    }

    function showToast(text) {
      const toast = $("toast");
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    render();
  </script>
</body>
</html>
